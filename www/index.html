<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ぷち表計算</title>
    <!-- デザイン(CSS) -->
    <link rel="stylesheet" href="style.css">
    <!-- Excel操作ライブラリ(SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 上部メニューバー -->
        <header id="top-bar">
            <div class="top-bar-main">
                <h1>ぷち表計算</h1>
                <div class="actions">
                    <button id="btn-open" class="btn">開く</button>
                    <button id="btn-copy" class="btn">コピー</button>
                    <button id="btn-paste" class="btn">貼付</button>
                    <button id="btn-export-csv" class="btn">CSV</button>
                    <button id="btn-export-excel" class="btn">Excel</button>
                </div>
                <!-- 隠しファイル入力 -->
                <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none;">
            </div>
            <!-- 数式・ヒントバー -->
            <div id="info-bar">
                <input type="text" id="formula-bar" placeholder="数式や値を入力...">
            </div>
        </header>

        <!-- メインの表エリア -->
        <div id="grid-container">
            <div id="grid"></div>
        </div>

        <!-- キーボード切り替えボタン -->
        <button id="btn-toggle-input" class="floating-btn">キーボード</button>

        <!-- 専用キーボード -->
        <div id="custom-keyboard" class="keyboard hidden">
            <div id="kb-resize-handle"></div>
            <div class="kb-keys">
                <!-- ここにJSでキーが配置される予定 -->
                <button class="kb-key" onclick="commitInput()">確定</button>
                <button class="kb-key" onclick="closeKeyboard()">閉じる</button>
            </div>
        </div>
    </div>
    <!-- メインプログラム(JS) -->
    <script src="script.js"></script>
</body>
</html>
